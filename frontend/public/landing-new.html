<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Adaptive Learning</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#03030a;--lime:#b9ff4b;--pink:#ff2d6b;--blue:#2d9cff;--gold:#ffc93c;--white:#eeeae3;--dim:#555566;}html{scroll-behavior:smooth;overflow-x:hidden}body{background:var(--bg);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;cursor:none}::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--lime)}#dot{position:fixed;width:8px;height:8px;background:var(--lime);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s,width .3s,height .3s,background .3s}#trail{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%)}.t-ring{position:absolute;border-radius:50%;transform:translate(-50%,-50%);border:1px solid var(--lime);opacity:0;animation:none}#loader{position:fixed;inset:0;background:var(--bg);z-index:9990;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}.load-txt{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:-.03em;overflow:hidden}.load-char{display:inline-block;animation:loadChar .6s cubic-bezier(.76,0,.24,1) both}.load-bar-wrap{width:200px;height:1px;background:rgba(255,255,255,.1)}.load-bar{height:100%;background:var(--lime);width:0;animation:loadBar 1.8s cubic-bezier(.76,0,.24,1) .2s forwards}@keyframes loadChar{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes loadBar{to{width:100%}}nav{position:fixed;inset-inline:0;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:24px 56px;mix-blend-mode:normal;transition:all .5s}nav.dark{background:rgba(3,3,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)}.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:10px}.logo-sq{width:30px;height:30px;background:var(--lime);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#000;font-size:13px;font-weight:700;flex-shrink:0}.nav-r{display:flex;align-items:center;gap:40px}.nav-r a{font-size:13px;color:var(--dim);text-decoration:none;letter-spacing:.04em;transition:color .2s}.nav-r a:hover{color:var(--white)}.nav-btn{padding:10px 26px;background:var(--lime);color:#000;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:40px;cursor:none;transition:transform .2s,box-shadow .2s;letter-spacing:.02em}.nav-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(185,255,75,.4)}</style></head><body><div id="loader"><div class="load-txt" id="loadTxt"></div><div class="load-bar-wrap"><div class="load-bar"></div></div></div><div id="dot"></div><div id="trail"></div><nav id="nav"><a href="#" class="logo"><div class="logo-sq">AL</div>Adaptive Learning</a><div class="nav-r"><a href="#features">Features</a><a href="#how">Process</a><a href="#testimonials">Stories</a><a href="#cta">Pricing</a><a href="/login"><button class="nav-btn">Get Started</button></a></div></nav><script>setTimeout(()=>{document.getElementById('loader').style.display='none';},2000);const dot=document.getElementById('dot');document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';});window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('dark',scrollY>60);});</script></body></html>
